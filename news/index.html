<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartReadGo</title>
  <meta property="og:title" content="SmartReadGo - Audio News"/>
  <meta property="og:description" content="Listen to the news, Save your time - Download SmartReadGo"/>
  <meta property="og:image" content="https://news-assets-srg.s3.eu-north-1.amazonaws.com/logo.jpg"/>
  <meta property="og:type" content="article"/>
  <meta property="og:site_name" content="SmartReadGo"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:image" content="https://news-assets-srg.s3.eu-north-1.amazonaws.com/logo.jpg"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A192F;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 16px;
      text-decoration: none;
      margin-bottom: 16px;
      width: 100%;
      max-width: 320px;
    }
    .btn-secondary {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <h1>SmartReadGo</h1>
  <p>Audio news for busy professionals.<br/>Listen to the news. Save your time.</p>
  <a class="btn" id="open-btn" href="#">Opening article...</a>
  <a class="btn btn-secondary" id="store-btn" href="https://play.google.com/store/apps/details?id=com.smartreadgo.app">
    Get the App
  </a>
  <script>
    (function() {
      const parts = window.location.pathname.split('/');
      const articleId = parts[parts.length - 1];
      const playStoreUrl = navigator.userAgent.match(/Android/i)
        ? 'market://details?id=com.smartreadgo.app'
        : 'https://play.google.com/store/apps/details?id=com.smartreadgo.app';
      document.getElementById('store-btn').href = playStoreUrl;
      const appUrl = articleId && articleId !== 'index.html' ?
        'smartreadgo://news/' + articleId :
        'smartreadgo://home';
      const openBtn = document.getElementById('open-btn');
      if (articleId && articleId !== 'index.html') {
        openBtn.textContent = 'Open in SmartReadGo';
        openBtn.href = appUrl;
      } else {
        openBtn.textContent = 'Download SmartReadGo';
        openBtn.href = playStoreUrl;
      }
      let appOpened = false;
      window.addEventListener('blur', function() { appOpened = true; });
      setTimeout(function() {
        if (!appOpened) {
          window.location.href = playStoreUrl;
        }
      }, 2500);
      if (articleId && articleId !== 'index.html') {
        window.location.href = appUrl;
      }
    })();
  </script>
</body>
</html>
